# Resource-conscious stack for the shared Hostinger VPS (halovisionai.cloud).
# Total mem_limit budget across all services stays under ~2GB — no
# Prometheus/Grafana in v1 (see ARCHITECTURE.md "Deliberately not in v1");
# health + structured logs cover monitoring for now.
#
# Hosting pattern matches the rest of this repo's sites (seelenhafen, halo4,
# hydron-one, school-ai-2/LG KI, ...): shared Traefik reverse proxy on the
# external `traefik-proxy` network, TLS via the `letsencrypt` certresolver.
# Dashboard and backend are Traefik-only (no direct host port) — both have
# their own app-level auth now (dashboard: HTTP Basic Auth via
# dashboard/middleware.ts; backend: X-API-Key, see app/core/auth.py), but no
# host port anyway since Traefik is the only intended path in. n8n keeps its
# direct port (47833) since N8N_BASIC_AUTH_ACTIVE gates it either way.
#   https://factory.halovisionai.cloud      -> dashboard
#   https://factory-api.halovisionai.cloud  -> backend API
#   47833 / https://factory-n8n.halovisionai.cloud -> n8n
# Postgres/Redis/Celery are internal-only — no host port, no Traefik label,
# on purpose: nothing external should ever reach them directly.
#
# Requires the `traefik-proxy` network to already exist on the VPS (it does
# — every other site in this repo attaches to it). If it genuinely doesn't:
# `docker network create traefik-proxy`.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: factory-postgres
    restart: unless-stopped
    networks:
      - internal
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-factory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factory}
      POSTGRES_DB: ${POSTGRES_DB:-factory}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-factory}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    container_name: factory-redis
    restart: unless-stopped
    networks:
      - internal
    command: ["redis-server", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 96m

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: factory-backend
    restart: unless-stopped
    networks:
      - internal
      - traefik-proxy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-factory}:${POSTGRES_PASSWORD:-factory}@postgres:5432/${POSTGRES_DB:-factory}
      REDIS_URL: redis://redis:6379/0
      API_KEY: ${API_KEY:?set API_KEY in .env}
    volumes:
      # Shared with celery_worker/celery_beat so an agent cloned by
      # core/evolution.py (written by whichever container runs the
      # scheduled cycle) is visible everywhere, and survives a restart —
      # first `up` seeds it from the image's baked-in /agents/configs.
      - agent_configs:/agents/configs
    # No host port: bypassing Traefik would still hit an unauthenticated
    # route unless API_KEY is set — see require_api_key in app/core/auth.py.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 384m
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-proxy
      - traefik.http.routers.factory-api.rule=Host(`factory-api.halovisionai.cloud`)
      - traefik.http.routers.factory-api.entrypoints=websecure
      - traefik.http.routers.factory-api.tls=true
      - traefik.http.routers.factory-api.tls.certresolver=letsencrypt
      - traefik.http.services.factory-api.loadbalancer.server.port=8000
      # No Traefik basicauth here on purpose: the dashboard calls this API
      # cross-origin via fetch(), and a browser can't complete an HTTP-auth
      # challenge for a CORS preflight — it just fails with "Failed to fetch".
      # Auth is instead an app-level X-API-Key check (see API_KEY below /
      # app/core/auth.py), which works fine with CORS since it's just a
      # header the dashboard's JS sets itself.

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: factory-celery-worker
    restart: unless-stopped
    networks:
      - internal
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-factory}:${POSTGRES_PASSWORD:-factory}@postgres:5432/${POSTGRES_DB:-factory}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - agent_configs:/agents/configs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 384m

  celery_beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: factory-celery-beat
    restart: unless-stopped
    networks:
      - internal
    command: ["celery", "-A", "app.celery_app", "beat", "--loglevel=INFO"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-factory}:${POSTGRES_PASSWORD:-factory}@postgres:5432/${POSTGRES_DB:-factory}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - agent_configs:/agents/configs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 128m

  dashboard:
    build:
      context: ./dashboard
      args:
        # Must be the URL your BROWSER can reach — not the in-network
        # "backend" hostname. Defaults to the public Traefik URL; override
        # in .env if you're only using the direct port fallback.
        NEXT_PUBLIC_API_URL: ${DASHBOARD_PUBLIC_API_URL:-https://factory-api.halovisionai.cloud}
        # Same value as backend's API_KEY — baked into the dashboard's JS
        # bundle. Safe here specifically because the dashboard route itself
        # sits behind the Traefik basicauth below (see lib/api.ts comment).
        NEXT_PUBLIC_API_KEY: ${API_KEY:?set API_KEY in .env}
    container_name: factory-dashboard
    restart: unless-stopped
    networks:
      - traefik-proxy
    env_file: .env
    environment:
      # Read at request time by dashboard/middleware.ts (HTTP Basic Auth) —
      # rotate by changing .env and restarting, no rebuild needed.
      DASHBOARD_USER: ${DASHBOARD_USER:?set DASHBOARD_USER in .env}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:?set DASHBOARD_PASSWORD in .env}
    # No host port either — same reasoning as backend above.
    depends_on:
      - backend
    mem_limit: 256m
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-proxy
      - traefik.http.routers.factory-dashboard.rule=Host(`factory.halovisionai.cloud`)
      - traefik.http.routers.factory-dashboard.entrypoints=websecure
      - traefik.http.routers.factory-dashboard.tls=true
      - traefik.http.routers.factory-dashboard.tls.certresolver=letsencrypt
      - traefik.http.services.factory-dashboard.loadbalancer.server.port=3000
      # No Traefik basicauth label here on purpose (used to be one, but its
      # htpasswd hash was a second secret that could drift from what the
      # user actually knows — see git history). dashboard/middleware.ts now
      # gates the whole app the same way in every deploy path (local dev,
      # Hostinger open, Traefik), driven by the DASHBOARD_USER/PASSWORD env
      # above — one secret, no htpasswd dance to rotate it.

  n8n:
    image: n8nio/n8n:latest
    container_name: factory-n8n
    restart: unless-stopped
    networks:
      - internal
      - traefik-proxy
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}
      N8N_HOST: ${N8N_HOST:-factory-n8n.halovisionai.cloud}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      GENERIC_TIMEZONE: ${TZ:-UTC}
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "47833:5678"
    mem_limit: 256m
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-proxy
      - traefik.http.routers.factory-n8n.rule=Host(`factory-n8n.halovisionai.cloud`)
      - traefik.http.routers.factory-n8n.entrypoints=websecure
      - traefik.http.routers.factory-n8n.tls=true
      - traefik.http.routers.factory-n8n.tls.certresolver=letsencrypt
      - traefik.http.services.factory-n8n.loadbalancer.server.port=5678
      # Separate instance from the existing n8n.halovisionai.cloud (that one
      # is Sable2's — see Sable2/ONLINE-SETUP.md). This n8n is dedicated to
      # ai-company automations and has its own data volume (n8n_data below).

networks:
  internal:
    driver: bridge
  traefik-proxy:
    external: true

volumes:
  postgres_data:
  n8n_data:
  agent_configs:
