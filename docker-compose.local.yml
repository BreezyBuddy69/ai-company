# Pure local testing — no Traefik, no external network, friendly ports.
# Use this on a laptop/dev machine with Docker Desktop. For the real
# deploy on the shared halovisionai.cloud VPS, use docker-compose.yml
# instead (see DEPLOY.md) — that one wires into the existing Traefik setup
# this repo's other sites already use.
#
# Usage: docker compose -f docker-compose.local.yml up -d --build

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: factory-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-factory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factory}
      POSTGRES_DB: ${POSTGRES_DB:-factory}
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-factory}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    container_name: factory-redis-local
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 96m

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: factory-backend-local
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-factory}:${POSTGRES_PASSWORD:-factory}@postgres:5432/${POSTGRES_DB:-factory}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 384m

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: factory-celery-worker-local
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-factory}:${POSTGRES_PASSWORD:-factory}@postgres:5432/${POSTGRES_DB:-factory}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 384m

  celery_beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: factory-celery-beat-local
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_app", "beat", "--loglevel=INFO"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-factory}:${POSTGRES_PASSWORD:-factory}@postgres:5432/${POSTGRES_DB:-factory}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 128m

  dashboard:
    build:
      context: ./dashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: factory-dashboard-local
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    mem_limit: 256m

  n8n:
    image: n8nio/n8n:latest
    container_name: factory-n8n-local
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}
      N8N_HOST: localhost
      N8N_PROTOCOL: http
      GENERIC_TIMEZONE: ${TZ:-UTC}
    volumes:
      - n8n_data_local:/home/node/.n8n
    ports:
      - "5678:5678"
    mem_limit: 256m

volumes:
  postgres_data_local:
  n8n_data_local:
